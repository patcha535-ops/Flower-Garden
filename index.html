<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Garden Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>🌸 Flower Garden</h1>
        
        <div class="stats-bar">
            <div class="stat-item">คะแนน: <span id="score">0</span></div>
            <div class="stat-item">ถัดไป: <span id="next-flowers">??</span></div>
        </div>

        <div id="garden"></div>

        <div class="controls">
            <button id="reset-btn" onclick="resetGame()">เริ่มเกมใหม่</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
